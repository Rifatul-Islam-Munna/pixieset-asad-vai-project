name: Update marketing UI

on:
  pull_request:
    branches:
      - developmentbranch
    paths:
      - .github/marketing-ui-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: developmentbranch
          fetch-depth: 0

      - name: Apply marketing UI changes
        run: python .github/update-marketing-ui.py

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Remove temporary workflow files
        run: |
          rm -f .github/update-marketing-ui.py
          rm -f .github/workflows/update-marketing-ui.yml
          rm -f .github/inspect-marketing.py
          rm -f .github/workflows/inspect-marketing.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add collection marketing subscription controls and refresh contacts UI"
          git push origin HEAD:developmentbranch
