name: Fix public opt-in

on:
  pull_request:
    branches:
      - developmentbranch
    paths:
      - .github/fix-public-optin-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: developmentbranch
          fetch-depth: 0
          show-progress: false

      - name: Apply public opt-in fix
        run: python .github/fix-public-optin.py

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Remove temporary files
        run: |
          rm -f .github/fix-public-optin.py
          rm -f .github/workflows/fix-public-optin.yml
          rm -f .github/fix-public-optin-trigger.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix public email registration marketing opt-in"
          git push origin HEAD:developmentbranch
