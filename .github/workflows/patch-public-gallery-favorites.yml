name: Finalize Dedicated Favorites Page

on:
  push:
    branches: [development]
    paths:
      - .github/workflows/patch-public-gallery-favorites.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Connect gallery navigation to the favorites page
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/components/dashboard/public-gallery.tsx')
          text = path.read_text()

          old = '''    enabled: favoritesEnabled,
    maxFavorites: maxFavoriteCount,
  });'''
          new = '''    enabled: favoritesEnabled,
    maxFavorites: maxFavoriteCount,
    favoritesPath: `/collection/${encodeURIComponent(name)}/${encodeURIComponent(galary)}/favorites`,
  });'''
          if old not in text:
              raise RuntimeError('Favorites hook block was not found')
          text = text.replace(old, new, 1)

          anchor = '''  } = favoriteTools;
  const pinRequired = downloadsEnabled && boolSetting(download.downloadPin);'''
          replacement = '''  } = favoriteTools;

  useEffect(() => {
    const openPhotoFromHash = () => {
      const hash = window.location.hash;
      if (!hash.startsWith("#photo-")) return;
      const imageId = decodeURIComponent(hash.slice("#photo-".length));
      const photo = galleryImages.find((image) => image._id === imageId);
      if (photo) setActiveImage(photo);
    };
    openPhotoFromHash();
    window.addEventListener("hashchange", openPhotoFromHash);
    return () => window.removeEventListener("hashchange", openPhotoFromHash);
  }, [collection?._id]);

  const pinRequired = downloadsEnabled && boolSetting(download.downloadPin);'''
          if anchor not in text:
              raise RuntimeError('Favorites hook result block was not found')
          text = text.replace(anchor, replacement, 1)
          path.write_text(text)
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify frontend build
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: npm ci && npm run build

      - name: Commit final integration
        run: |
          rm -f .github/workflows/patch-public-gallery-favorites.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: route My Favorites to its own gallery page"
          git pull --rebase origin development
          git push origin HEAD:development
