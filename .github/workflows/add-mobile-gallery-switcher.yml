name: Add Mobile Gallery Product Switcher

on:
  push:
    branches:
      - development
    paths:
      - .github/workflows/add-mobile-gallery-switcher.yml

permissions:
  contents: write

jobs:
  update-switcher:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout development
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0
      - name: Add Mobile Gallery App to existing product switcher
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/components/dashboard/client-dashboard.tsx')
          text = path.read_text()
          if 'key: "mobile-gallery"' in text:
              print('Mobile Gallery App already exists in switcher')
              raise SystemExit(0)

          marker = '''  {
              key: "store-gallery",
              title: "Store Gallery",
              text: "Your online store for prints and downloads",
              href: "/dashboard/store-gallery",
              mark: "bg-[#ff4f5d]",
              accent: "from-[#ff4f5d] to-[#ffc7cd]",
            },
          ] as const;'''

          replacement = '''  {
              key: "store-gallery",
              title: "Store Gallery",
              text: "Your online store for prints and downloads",
              href: "/dashboard/store-gallery",
              mark: "bg-[#ff4f5d]",
              accent: "from-[#ff4f5d] to-[#ffc7cd]",
            },
            {
              key: "mobile-gallery",
              title: "Mobile Gallery App",
              text: "Create installable mobile-first photo apps",
              href: "/dashboard/mobile-gallery",
              mark: "bg-[#f5c421]",
              accent: "from-[#f5c421] to-[#ffe99a]",
            },
          ] as const;'''

          if marker not in text:
              raise SystemExit('Expected switcher block was not found; no file was changed')
          path.write_text(text.replace(marker, replacement, 1))
          PY
      - name: Commit switcher update to development
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/components/dashboard/client-dashboard.tsx
          git commit -m "feat(mobile-gallery): add product switcher entry"
          git push origin HEAD:development
