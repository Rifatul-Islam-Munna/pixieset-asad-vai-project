name: Update collection media and share UI

on:
  pull_request:
    branches:
      - developmentbranch
    paths:
      - .github/update-collection-media-share-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: developmentbranch
          fetch-depth: 0
          show-progress: false

      - name: Apply UI update
        run: python .github/update-collection-media-share.py

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Remove temporary files
        run: |
          rm -f .github/update-collection-media-share.py
          rm -f .github/workflows/update-collection-media-share.yml
          rm -f .github/update-collection-media-share-trigger.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update collection upload, sorting, QR, and email sharing UI"
          git push origin HEAD:developmentbranch
