name: Apply Mobile Gallery Final Audit Fixes

on:
  push:
    branches:
      - development
    paths:
      - .github/workflows/mobile-gallery-final-audit-fixes.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout development
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Apply audited frontend fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          def replace_once(text, old, new, label):
              if old not in text:
                  raise SystemExit(f'Missing expected block: {label}')
              return text.replace(old, new, 1)

          public_path = Path('frontend/components/mobile-gallery/mobile-gallery-public.tsx')
          public = public_path.read_text()

          public = replace_once(
              public,
              'import type { MobileGalleryApp, MobileGalleryImage, MobileGalleryProfile } from "@/api-hooks/use-mobile-gallery";\n\nconst themeStyles = {\n  echo: { fontFamily: "Georgia, serif", titleClass: "tracking-[0.16em] uppercase", align: "text-center" },\n  spring: { fontFamily: "\'Times New Roman\', serif", titleClass: "italic tracking-wide", align: "text-left" },\n  lark: { fontFamily: "Arial, sans-serif", titleClass: "font-semibold tracking-[0.04em]", align: "text-left" },\n  sage: { fontFamily: "\'Courier New\', monospace", titleClass: "uppercase tracking-[0.18em]", align: "text-center" },\n} as const;\n',
              'import type { MobileGalleryApp, MobileGalleryImage, MobileGalleryProfile } from "@/api-hooks/use-mobile-gallery";\nimport { MobileGalleryCover, mobileGalleryThemes } from "./mobile-gallery-cover";\n',
              'public theme import',
          )
          public = replace_once(public, 'const theme = themeStyles[design.theme ?? "lark"];', 'const theme = mobileGalleryThemes[design.theme ?? "lark"];', 'public theme lookup')
          public = replace_once(
              public,
              '  const [notice, setNotice] = useState("");\n  const storageKey = `mobile-gallery-favorites:${app.slug}`;',
              '  const [notice, setNotice] = useState("");\n  const [isIOS, setIsIOS] = useState(false);\n  const [isStandalone, setIsStandalone] = useState(false);\n  const [showInstallHelp, setShowInstallHelp] = useState(false);\n  const storageKey = `mobile-gallery-favorites:${app.slug}`;',
              'install state',
          )
          public = replace_once(
              public,
              '  useEffect(() => {\n    const handler = (event: Event) => {\n      event.preventDefault();\n      setInstallPrompt(event as DeferredPrompt);\n    };\n    window.addEventListener("beforeinstallprompt", handler);\n    return () => window.removeEventListener("beforeinstallprompt", handler);\n  }, []);',
              '  useEffect(() => {\n    const handler = (event: Event) => {\n      event.preventDefault();\n      setInstallPrompt(event as DeferredPrompt);\n    };\n    window.addEventListener("beforeinstallprompt", handler);\n    return () => window.removeEventListener("beforeinstallprompt", handler);\n  }, []);\n\n  useEffect(() => {\n    const navigatorWithStandalone = navigator as Navigator & { standalone?: boolean };\n    const appleMobile = /iphone|ipad|ipod/i.test(navigator.userAgent) ||\n      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);\n    setIsIOS(appleMobile);\n    setIsStandalone(Boolean(navigatorWithStandalone.standalone) || window.matchMedia("(display-mode: standalone)").matches);\n  }, []);',
              'platform detection',
          )
          public = replace_once(
              public,
              '  const install = async () => {\n    if (installPrompt) {\n      await installPrompt.prompt();\n      await installPrompt.userChoice.catch(() => null);\n    }\n    localStorage.setItem(`mobile-gallery-install-seen:${app.slug}`, "1");\n    setInstallOpen(false);\n  };\n\n  const dismissInstall = () => {\n    localStorage.setItem(`mobile-gallery-install-seen:${app.slug}`, "1");\n    setInstallOpen(false);\n  };',
              '  const install = async () => {\n    if (!installPrompt) {\n      setShowInstallHelp(true);\n      return;\n    }\n    await installPrompt.prompt();\n    const choice = await installPrompt.userChoice.catch(() => null);\n    if (choice?.outcome === "accepted") {\n      setIsStandalone(true);\n      localStorage.setItem(`mobile-gallery-install-seen:${app.slug}`, "1");\n      setInstallOpen(false);\n    }\n    setInstallPrompt(null);\n  };\n\n  const openInstall = () => {\n    setShowInstallHelp(false);\n    setInstallOpen(true);\n  };\n\n  const dismissInstall = () => {\n    localStorage.setItem(`mobile-gallery-install-seen:${app.slug}`, "1");\n    setShowInstallHelp(false);\n    setInstallOpen(false);\n  };',
              'install behavior',
          )
          public = replace_once(
              public,
              '  const cover = app.coverImage || images[0]?.url;\n  const coverStyle = design.coverStyle || "none";\n  const focal = design.focal || { x: 50, y: 50 };\n',
              '',
              'obsolete cover variables',
          )
          public = replace_once(
              public,
              '      className={embedded ? "relative h-full overflow-y-auto" : "min-h-dvh"}',
              '      className={embedded ? "relative h-full overflow-y-auto pb-20" : "min-h-dvh pb-20"}',
              'bottom nav padding',
          )

          header_pattern = re.compile(r'      <header className=\{theme\.align\}>.*?      </header>\n', re.S)
          public, count = header_pattern.subn('      <MobileGalleryCover app={app} design={design} images={images} />\n', public, count=1)
          if count != 1:
              raise SystemExit('Could not replace public cover header')

          public = replace_once(
              public,
              '            <button type="button" onClick={share} className="mt-8 w-full bg-current px-5 py-4 text-sm font-semibold">\n              <span style={{ color: bg }}>Share gallery link</span>\n            </button>',
              '            <button type="button" onClick={share} className="mt-8 w-full bg-current px-5 py-4 text-sm font-semibold">\n              <span style={{ color: bg }}>Share gallery link</span>\n            </button>\n            {!isStandalone && <button type="button" onClick={openInstall} className="mt-3 w-full border border-current px-5 py-4 text-sm font-semibold">Install on this device</button>}',
              'share install action',
          )
          public = replace_once(
              public,
              '            <div className="mt-8 flex flex-wrap justify-center gap-3">\n              {Object.entries(profile.socialLinks || {}).filter(([, value]) => Boolean(value)).map(([name, value]) => (\n                <a key={name} href={value} target="_blank" rel="noreferrer" className="border border-current px-4 py-2 text-xs uppercase tracking-wider">{name}</a>\n              ))}\n            </div>',
              '            <div className="mt-8 flex flex-wrap justify-center gap-3">\n              {Object.entries(profile.socialLinks || {}).filter(([, value]) => Boolean(value)).map(([name, value]) => (\n                <a key={name} href={value} target="_blank" rel="noreferrer" className="border border-current px-4 py-2 text-xs uppercase tracking-wider">{name}</a>\n              ))}\n            </div>\n            {!isStandalone && <button type="button" onClick={openInstall} className="mt-8 w-full border border-current px-5 py-3 text-sm font-semibold">Install this gallery app</button>}',
              'account install action',
          )

          install_pattern = re.compile(r'      \{installOpen && !embedded && \(.*?      \)\}\n\n      \{notice &&', re.S)
          install_replacement = '''      {installOpen && !embedded && (
        <div className="fixed inset-0 z-[60] flex items-end justify-center bg-black/45 p-4 sm:items-center">
          <div className="w-full max-w-sm rounded-3xl bg-white p-6 text-[#222] shadow-2xl">
            <div className="flex items-start justify-between gap-4">
              <div className="flex min-w-0 items-center gap-4">
                {app.iconUrl ? <img src={app.iconUrl} alt="" className="size-16 shrink-0 rounded-2xl object-cover" /> : <div className="flex size-16 shrink-0 items-center justify-center rounded-2xl bg-[#efefef]"><Smartphone className="size-7" /></div>}
                <div className="min-w-0"><p className="break-words font-semibold">{showInstallHelp ? "Add to Home Screen" : `Download ${app.name}`}</p><p className="mt-1 text-xs text-[#777]">{showInstallHelp ? "Follow the browser steps below." : "Install this gallery on your phone."}</p></div>
              </div>
              <button type="button" onClick={dismissInstall}><X className="size-5" /></button>
            </div>
            {showInstallHelp ? (
              <div className="mt-6">
                <ol className="space-y-3 text-sm leading-6 text-[#555]">
                  {isIOS ? <><li><b>1.</b> Open this link in Safari.</li><li><b>2.</b> Tap the Share button.</li><li><b>3.</b> Choose “Add to Home Screen”, then tap Add.</li></> : <><li><b>1.</b> Open your browser menu.</li><li><b>2.</b> Choose “Install app” or “Add to Home screen”.</li><li><b>3.</b> Confirm the installation.</li></>}
                </ol>
                <button type="button" onClick={dismissInstall} className="mt-6 w-full rounded-xl bg-[#18bfa6] px-5 py-3 font-semibold text-white">Got it</button>
              </div>
            ) : (
              <>
                <button type="button" onClick={install} className="mt-6 w-full rounded-xl bg-[#18bfa6] px-5 py-3 font-semibold text-white">{installPrompt ? "Install App" : isIOS ? "Show iPhone Install Steps" : "Show Install Instructions"}</button>
                {!installPrompt && <p className="mt-3 text-center text-xs leading-5 text-[#777]">Automatic installation is not available in this browser, but the gallery can still be added to the home screen.</p>}
              </>
            )}
          </div>
        </div>
      )}

      {notice &&'''
          public, count = install_pattern.subn(install_replacement, public, count=1)
          if count != 1:
              raise SystemExit('Could not replace install modal')

          public = re.sub(r'\nfunction formatDate\(value: string\) \{.*?\n\}\n?$', '\n', public, flags=re.S)
          public_path.write_text(public)

          admin_path = Path('frontend/components/mobile-gallery/mobile-gallery-admin.tsx')
          admin = admin_path.read_text()
          admin = replace_once(
              admin,
              'import { MobileGalleryPublic } from "./mobile-gallery-public";',
              'import { MobileGalleryCover, MobileGalleryThemePreview } from "./mobile-gallery-cover";\nimport { MobileGalleryPublic } from "./mobile-gallery-public";',
              'admin cover import',
          )
          admin = replace_once(
              admin,
              '  const { appQuery, updateApp, uploadImages, reorderImages, deleteImage } = useMobileGalleryApp(appId);',
              '  const { appQuery, updateApp, uploadImages, reorderImages, deleteImage, sendInvite } = useMobileGalleryApp(appId);',
              'invite mutation destructure',
          )
          admin = replace_once(
              admin,
              '  if (view === "share") return <ShareScreen app={app} />;',
              '  if (view === "share") return <ShareScreen app={app} profile={profile} sendInvite={sendInvite} />;',
              'share screen props',
          )
          admin = replace_once(
              admin,
              '              <div className="relative aspect-[4/3] overflow-hidden bg-[#eee]">\n                <img src={cover} alt="Cover focal preview" className="h-full w-full object-cover" style={{ objectPosition: `${focal.x}% ${focal.y}%` }} />\n                <span className="absolute size-5 -translate-x-1/2 -translate-y-1/2 rounded-full border-2 border-white bg-[#18bfa6] shadow" style={{ left: `${focal.x}%`, top: `${focal.y}%` }} />\n              </div>',
              '              <div className="relative aspect-[4/3] cursor-crosshair overflow-hidden bg-[#eee]" onClick={(event) => { const rect = event.currentTarget.getBoundingClientRect(); const x = Math.max(0, Math.min(100, ((event.clientX - rect.left) / rect.width) * 100)); const y = Math.max(0, Math.min(100, ((event.clientY - rect.top) / rect.height) * 100)); patchDesign({ focal: { x: Math.round(x), y: Math.round(y) } }); }}>\n                <img src={cover} alt="Cover focal preview" className="h-full w-full object-cover" style={{ objectPosition: `${focal.x}% ${focal.y}%` }} />\n                <span className="pointer-events-none absolute size-5 -translate-x-1/2 -translate-y-1/2 rounded-full border-2 border-white bg-[#18bfa6] shadow" style={{ left: `${focal.x}%`, top: `${focal.y}%` }} />\n              </div>\n              <p className="mt-2 text-xs text-[#777]">Click directly on the photo to choose the focal point, or fine-tune it with the sliders.</p>',
              'click focal selector',
          )
          old_theme = '<div className="grid grid-cols-2 gap-3 sm:grid-cols-4">{(["echo", "spring", "lark", "sage"] as const).map((theme) => <button key={theme} onClick={() => patchDesign({ theme })} className={`relative min-h-32 overflow-hidden border px-3 py-5 capitalize ${design.theme === theme ? "border-[#18bfa6] bg-[#f4fffc]" : ""}`}><span className={`block text-lg ${theme === "echo" ? "font-serif uppercase tracking-widest" : theme === "spring" ? "font-serif italic" : theme === "sage" ? "font-mono uppercase tracking-wider" : "font-sans font-semibold"}`}>{theme}</span><span className="mt-4 block text-[10px] leading-4 text-[#777]">A unique cover font and layout</span>{design.theme === theme && <Check className="absolute right-2 top-2 size-4 text-[#18bfa6]" />}</button>)}</div>'
          new_theme = '<div className="grid grid-cols-2 gap-3 sm:grid-cols-4">{(["echo", "spring", "lark", "sage"] as const).map((themeName) => <button key={themeName} onClick={() => patchDesign({ theme: themeName })} className={`relative overflow-hidden border text-left capitalize ${design.theme === themeName ? "border-[#18bfa6] bg-[#f4fffc]" : ""}`}><MobileGalleryThemePreview theme={themeName} /><span className="block px-3 py-3 text-sm font-semibold">{themeName}</span>{design.theme === themeName && <Check className="absolute right-2 top-2 size-4 rounded-full bg-white text-[#18bfa6]" />}</button>)}</div>'
          admin = replace_once(admin, old_theme, new_theme, 'theme previews')
          admin = replace_once(
              admin,
              'function ShareScreen({ app }: { app: MobileGalleryApp }) {\n  const [step, setStep] = useState<ShareStep>("method");\n  const [email, setEmail] = useState("");',
              'function ShareScreen({ app, profile, sendInvite }: { app: MobileGalleryApp; profile: MobileGalleryProfile; sendInvite: any }) {\n  const [step, setStep] = useState<ShareStep>("method");\n  const [email, setEmail] = useState("");\n  const [sendCopy, setSendCopy] = useState(true);\n  const isPublished = app.status !== "draft";',
              'share signature and state',
          )
          admin = replace_once(
              admin,
              '  function send(event: FormEvent) {\n    event.preventDefault();\n    window.location.href = `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;\n  }',
              '  async function send(event: FormEvent) {\n    event.preventDefault();\n    if (!isPublished) { toast.error("Publish this app before sharing it"); return; }\n    try {\n      const result = await sendInvite.mutateAsync({ to: email, subject, message: intro, templateTitle: selectedTemplate.title, link, sendCopy });\n      if (result.data.delivered) {\n        toast.success("Invitation sent");\n        return;\n      }\n      toast.info("Email delivery is not configured, so the prepared invitation was opened in your email app.");\n      window.location.href = `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;\n    } catch (error) {\n      toast.error(error instanceof Error ? error.message : "Could not send invitation");\n    }\n  }',
              'email send handler',
          )
          admin = replace_once(
              admin,
              '      <div className="border-b bg-white px-4 py-4 sm:px-6"><button onClick={() => step === "method" ? history.back() : setStep(step === "compose" ? "templates" : "method")} className="flex items-center gap-2 text-sm"><ArrowLeft className="size-4" /> {step === "method" ? `Back to ${app.name}` : "Back"}</button></div>\n',
              '      <div className="border-b bg-white px-4 py-4 sm:px-6"><button onClick={() => step === "method" ? history.back() : setStep(step === "compose" ? "templates" : "method")} className="flex items-center gap-2 text-sm"><ArrowLeft className="size-4" /> {step === "method" ? `Back to ${app.name}` : "Back"}</button></div>\n      {!isPublished && <div className="border-b border-amber-200 bg-amber-50 px-4 py-4 text-center text-sm text-amber-900">This app is unpublished. Publish it in App Settings before sending email invitations or sharing the public link.</div>}\n',
              'draft share warning',
          )
          admin = admin.replace('onClick={() => setStep("templates")} className="border bg-white', 'onClick={() => isPublished && setStep("templates")} disabled={!isPublished} className="border bg-white disabled:cursor-not-allowed disabled:opacity-50', 1)
          admin = admin.replace('onClick={() => setStep("link")} className="border bg-white', 'onClick={() => isPublished && setStep("link")} disabled={!isPublished} className="border bg-white disabled:cursor-not-allowed disabled:opacity-50', 1)
          admin = replace_once(
              admin,
              '            <textarea readOnly value={body} rows={9} className="mt-5 w-full border p-4 text-sm leading-6 text-[#555]" />\n            <div className="mt-5 flex flex-wrap gap-3"><button className="flex items-center gap-2 bg-[#18bfa6] px-6 py-3 font-semibold text-white"><Mail className="size-4" /> Open Email Invite</button><button type="button" onClick={() => navigator.clipboard.writeText(link).then(() => toast.success("Link copied"))} className="flex items-center gap-2 border px-5 py-3"><Copy className="size-4" /> Copy Link</button></div>\n            <p className="mt-4 text-xs leading-5 text-[#888]">This opens the prepared invitation in your device’s email application. The public app link is already included.</p>',
              '            <textarea readOnly value={body} rows={9} className="mt-5 w-full border p-4 text-sm leading-6 text-[#555]" />\n            {profile.contactEmail && <label className="mt-4 flex items-center gap-2 text-sm text-[#666]"><input type="checkbox" checked={sendCopy} onChange={(event) => setSendCopy(event.target.checked)} /> Send a copy to {profile.contactEmail}</label>}\n            <div className="mt-5 flex flex-wrap gap-3"><button disabled={sendInvite.isPending || !isPublished} className="flex items-center gap-2 bg-[#18bfa6] px-6 py-3 font-semibold text-white disabled:cursor-not-allowed disabled:opacity-60"><Mail className="size-4" /> {sendInvite.isPending ? "Sending…" : "Send Invite"}</button><button type="button" onClick={() => navigator.clipboard.writeText(link).then(() => toast.success("Link copied"))} className="flex items-center gap-2 border px-5 py-3"><Copy className="size-4" /> Copy Link</button></div>\n            <p className="mt-4 text-xs leading-5 text-[#888]">When server email delivery is configured, the invite is sent directly. Otherwise the same prepared invitation opens in your email application.</p>',
              'email composer controls',
          )
          admin_path.write_text(admin)
          PY

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify backend build
        working-directory: backend
        run: npm ci && npm run build

      - name: Verify frontend build
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: npm ci && npm run build

      - name: Commit audited fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/components/mobile-gallery/mobile-gallery-public.tsx frontend/components/mobile-gallery/mobile-gallery-admin.tsx
          git commit -m "fix(mobile-gallery): complete audited UI and install flows"
          git push origin HEAD:development
