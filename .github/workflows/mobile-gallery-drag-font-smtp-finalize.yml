name: Finalize Mobile Gallery Drag Font SMTP

on:
  push:
    branches:
      - development
    paths:
      - .github/workflows/mobile-gallery-drag-font-smtp-finalize.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout development
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Wire global SMTP mutation into admin
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('frontend/components/mobile-gallery/mobile-gallery-admin.tsx')
          text = path.read_text()
          replacements = [
            (
              '  const { appQuery, updateApp, uploadImages, reorderImages, deleteImage } = useMobileGalleryApp(appId);',
              '  const { appQuery, updateApp, uploadImages, reorderImages, deleteImage, sendInvite } = useMobileGalleryApp(appId);',
              'sendInvite hook',
            ),
            (
              '  if (view === "share") return <MobileGalleryShareScreen app={app} profile={profile} />;',
              '  if (view === "share") return <MobileGalleryShareScreen app={app} profile={profile} sendInvite={sendInvite} />;',
              'sendInvite prop',
            ),
          ]
          for old, new, label in replacements:
            if old not in text:
              raise SystemExit(f'Missing expected admin block: {label}')
            text = text.replace(old, new, 1)
          path.write_text(text)
          PY

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync backend dependency lock
        working-directory: backend
        run: npm install --package-lock-only

      - name: Build backend
        working-directory: backend
        run: npm ci && npm run build

      - name: Build frontend
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
          MINIO_URL: http://127.0.0.1:9000
        run: npm ci && npm run build

      - name: Check Mobile Gallery TypeScript errors
        working-directory: frontend
        run: |
          set +e
          npx tsc --noEmit --pretty false > /tmp/types.log 2>&1
          grep -E "mobile-gallery|use-mobile-gallery" /tmp/types.log > /tmp/mobile-errors.log || true
          if [ -s /tmp/mobile-errors.log ]; then
            cat /tmp/mobile-errors.log
            exit 1
          fi

      - name: Write verification report
        run: |
          cat > docs/mobile-gallery-drag-font-smtp-verification.md <<'EOF'
          # Mobile Gallery Drag, Font and SMTP Verification

          Verified on the `development` branch.

          - Backend production build: PASS
          - Frontend production build: PASS
          - Mobile Gallery matching TypeScript errors: NONE FOUND
          - Focal point: direct pointer drag, no focal sliders
          - Cover text: direct drag positioning on full covers
          - Numeric design controls: selectable presets plus exact number input, no range sliders
          - Custom fonts: WOFF, WOFF2, TTF and OTF upload with same-origin font proxy
          - Email: global NestJS SMTP service with Mobile Gallery integration
          - Missing SMTP environment: warning log plus safe mail-app fallback, no request failure
          EOF

      - name: Commit verified integration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/package-lock.json frontend/components/mobile-gallery/mobile-gallery-admin.tsx docs/mobile-gallery-drag-font-smtp-verification.md
          git commit -m "fix(mobile-gallery): verify direct controls fonts and global SMTP"
          git push origin HEAD:development
