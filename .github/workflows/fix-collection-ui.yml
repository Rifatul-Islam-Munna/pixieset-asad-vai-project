name: Fix collection UI

on:
  pull_request:
    branches:
      - developmentbranch
    paths:
      - .github/fix-collection-ui-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: developmentbranch
          fetch-depth: 0

      - name: Apply collection UI fixes
        run: python .github/fix-collection-ui.py

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Remove temporary workflow files
        run: |
          rm -f .github/fix-collection-ui.py
          rm -f .github/workflows/fix-collection-ui.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix collection menus, duplicate set keys, and marketing modal"
          git push origin HEAD:developmentbranch
