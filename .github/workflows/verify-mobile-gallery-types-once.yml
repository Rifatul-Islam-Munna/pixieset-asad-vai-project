name: Verify Mobile Gallery Types Once

on:
  push:
    branches:
      - development
    paths:
      - .github/workflows/verify-mobile-gallery-types-once.yml

permissions:
  contents: write

jobs:
  verify-types:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout development
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run frontend TypeScript validation and write report
        run: |
          set +e
          cd frontend
          npm ci > /tmp/type-install.log 2>&1
          INSTALL_STATUS=$?
          if [ "$INSTALL_STATUS" -eq 0 ]; then
            npx tsc --noEmit --pretty false > /tmp/typecheck.log 2>&1
            TYPE_STATUS=$?
          else
            TYPE_STATUS=99
            cp /tmp/type-install.log /tmp/typecheck.log
          fi
          cd ..

          MOBILE_ERRORS=$(grep -E "mobile-gallery|use-mobile-gallery" /tmp/typecheck.log || true)
          mkdir -p docs
          {
            echo "# Mobile Gallery Type Verification"
            echo
            echo "Generated from the development branch by GitHub Actions."
            echo
            if [ -z "$MOBILE_ERRORS" ]; then
              echo "- Mobile Gallery TypeScript errors: NONE FOUND"
            else
              echo "- Mobile Gallery TypeScript errors: FOUND"
            fi
            if [ "$TYPE_STATUS" -eq 0 ]; then
              echo "- Full frontend TypeScript check: PASS"
            else
              echo "- Full frontend TypeScript check: FAIL (the repository may contain unrelated existing type errors)"
            fi
            echo
            echo "## Mobile Gallery matching errors"
            echo '```text'
            if [ -z "$MOBILE_ERRORS" ]; then echo "No mobile-gallery errors found."; else echo "$MOBILE_ERRORS"; fi
            echo '```'
            echo
            echo "## Full TypeScript log tail"
            echo '```text'
            tail -n 180 /tmp/typecheck.log
            echo '```'
          } > docs/mobile-gallery-type-report.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/mobile-gallery-type-report.md
          git commit -m "chore: record mobile gallery type verification" || true
          git push origin HEAD:development
