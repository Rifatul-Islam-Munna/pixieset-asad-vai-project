name: Verify Dynamic Homepage Builds

on:
  pull_request:
    branches: [main]
    types: [opened, reopened]

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'development'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Replace unsupported brand icons
        run: |
          python - <<'PY'
          from pathlib import Path

          settings = Path('frontend/components/dashboard/homepage-settings-panel.tsx')
          text = settings.read_text()
          for name in ('Facebook', 'Instagram', 'Linkedin', 'Youtube'):
              text = text.replace(f'  {name},\n', '')
          text = text.replace('<Instagram className="size-4" />', '<span className="text-[10px] font-black">IG</span>')
          text = text.replace('<Facebook className="size-4" />', '<span className="text-[10px] font-black">FB</span>')
          text = text.replace('<Youtube className="size-4" />', '<span className="text-[10px] font-black">YT</span>')
          text = text.replace('<Linkedin className="size-4" />', '<span className="text-[10px] font-black">IN</span>')
          settings.write_text(text)

          public = Path('frontend/components/dashboard/public-homepage.tsx')
          text = public.read_text()
          for name in ('Facebook', 'Instagram', 'Linkedin', 'Youtube'):
              text = text.replace(f'  {name},\n', '')
          old_items = '''  const socialItems = [
    ["instagram", Instagram],
    ["facebook", Facebook],
    ["youtube", Youtube],
    ["linkedin", Linkedin],
  ] as const;'''
          new_items = '''  const socialItems = [
    ["instagram", "IG"],
    ["facebook", "FB"],
    ["youtube", "YT"],
    ["linkedin", "IN"],
  ] as const;'''
          if old_items not in text:
              raise RuntimeError('Social item block not found')
          text = text.replace(old_items, new_items, 1)
          text = text.replace(
              '{socialItems.map(([key, Icon]) => {',
              '{socialItems.map(([key, label]) => {',
              1,
          )
          text = text.replace(
              '<Icon className="size-4" />',
              '<span className="text-[10px] font-black tracking-wider">{label}</span>',
              1,
          )
          public.write_text(text)
          PY
          rm -f docs/homepage-backend-build.txt docs/homepage-frontend-build.txt

      - name: Commit homepage compatibility fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: use supported homepage social labels" || true
          git pull --rebase origin development
          git push origin HEAD:development

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build backend
        id: backend
        continue-on-error: true
        working-directory: backend
        run: |
          set -o pipefail
          (npm ci && npm run build) 2>&1 | tee ../docs/homepage-backend-build.txt

      - name: Build frontend
        id: frontend
        continue-on-error: true
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: |
          set -o pipefail
          (npm ci && npm run build) 2>&1 | tee ../docs/homepage-frontend-build.txt

      - name: Commit failed build logs
        if: steps.backend.outcome == 'failure' || steps.frontend.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/homepage-backend-build.txt docs/homepage-frontend-build.txt
          git commit -m "chore: capture dynamic homepage build errors" || true
          git pull --rebase origin development
          git push origin HEAD:development
          exit 1

      - name: Confirm successful builds
        if: steps.backend.outcome == 'success' && steps.frontend.outcome == 'success'
        run: echo "Backend and frontend builds passed."
