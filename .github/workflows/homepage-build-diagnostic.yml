name: Verify Dynamic Homepage Builds

on:
  push:
    branches: [development]
    paths:
      - backend/src/homepage/**
      - frontend/components/dashboard/homepage-settings-panel.tsx
      - frontend/components/dashboard/public-homepage.tsx
      - .github/workflows/homepage-build-diagnostic.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build backend
        id: backend
        continue-on-error: true
        working-directory: backend
        run: |
          set -o pipefail
          (npm ci && npm run build) 2>&1 | tee ../docs/homepage-backend-build.txt

      - name: Build frontend
        id: frontend
        continue-on-error: true
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: |
          set -o pipefail
          (npm ci && npm run build) 2>&1 | tee ../docs/homepage-frontend-build.txt

      - name: Commit failed build logs
        if: steps.backend.outcome == 'failure' || steps.frontend.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/homepage-backend-build.txt docs/homepage-frontend-build.txt
          git commit -m "chore: capture dynamic homepage build errors" || true
          git pull --rebase origin development
          git push origin HEAD:development
          exit 1

      - name: Confirm successful builds
        if: steps.backend.outcome == 'success' && steps.frontend.outcome == 'success'
        run: echo "Backend and frontend builds passed."
