name: Verify Admin and Favorites

on:
  push:
    branches: [development]
    paths:
      - .github/workflows/verify-admin-favorites.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build backend
        id: backend
        continue-on-error: true
        working-directory: backend
        run: |
          set -o pipefail
          (npm ci && npm run build) 2>&1 | tee ../docs/admin-favorites-backend-build.txt

      - name: Build frontend
        id: frontend
        continue-on-error: true
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: |
          set -o pipefail
          (npm ci && npm run build) 2>&1 | tee ../docs/admin-favorites-frontend-build.txt

      - name: Commit verification result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.backend.outcome }}" = "success" ] && [ "${{ steps.frontend.outcome }}" = "success" ]; then
            printf "Backend and frontend production builds passed.\n" > docs/admin-favorites-build-ok.txt
            rm -f docs/admin-favorites-backend-build.txt docs/admin-favorites-frontend-build.txt
            rm -f .github/workflows/verify-admin-favorites.yml
            git add -A
            git commit -m "chore: confirm admin and favorites builds"
            git pull --rebase origin development
            git push origin HEAD:development
          else
            git add docs/admin-favorites-backend-build.txt docs/admin-favorites-frontend-build.txt
            git commit -m "chore: capture admin and favorites build errors" || true
            git pull --rebase origin development
            git push origin HEAD:development
            exit 1
          fi
