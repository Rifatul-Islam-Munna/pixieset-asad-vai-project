name: Run Admin Plan Finalizer PR

on:
  pull_request:
    branches: [main]
    types: [opened, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'development'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Execute embedded grouped implementation
        id: implement
        continue-on-error: true
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap, traceback
          try:
              workflow = Path('.github/workflows/finalize-admin-plan-features.yml').read_text()
              marker = "          python - <<'PY'\n"
              end_marker = "\n          PY\n"
              script = workflow.split(marker, 1)[1].split(end_marker, 1)[0]
              exec(compile(textwrap.dedent(script), 'admin-plan-finalizer.py', 'exec'))
          except BaseException:
              Path('docs/admin-finalizer-error.txt').write_text(traceback.format_exc())
              raise
          PY

      - name: Commit diagnostic on failure
        if: steps.implement.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/admin-finalizer-error.txt
          git commit -m "chore: capture admin finalizer error"
          git push origin HEAD:development
          exit 1

      - name: Remove temporary trigger files
        if: steps.implement.outcome == 'success'
        run: |
          rm -f .github/workflows/finalize-admin-plan-features.yml
          rm -f .github/workflows/run-admin-plan-finalizer-pr.yml
          rm -f .github/workflows/run-admin-plan-finalizer.yml
          rm -f .github/ADMIN_PLAN_FEATURE_TRIGGER.md
          rm -f docs/admin-plan-feature-work-note.md
          rm -f docs/.keep-admin-feature-run
          rm -f docs/.admin-feature-status
          rm -f docs/.admin-feature-pr-ready
          rm -f docs/.admin-feature-final-trigger
          rm -f docs/.admin-feature-open-pr
          rm -f docs/.admin-feature-trigger-complete
          rm -f docs/.admin-feature-workflow-triggered
          rm -f docs/admin-finalizer-error.txt

      - uses: actions/setup-node@v4
        if: steps.implement.outcome == 'success'
        with:
          node-version: 22

      - name: Build backend
        if: steps.implement.outcome == 'success'
        working-directory: backend
        run: npm ci && npm run build

      - name: Build frontend
        if: steps.implement.outcome == 'success'
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: npm ci && npm run build

      - name: Commit grouped implementation
        if: steps.implement.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add admin template management and plan feature access"
          git push origin HEAD:development
