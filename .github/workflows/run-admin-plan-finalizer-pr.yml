name: Run Admin Plan Finalizer PR

on:
  pull_request:
    branches: [main]
    types: [opened, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'development'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Execute embedded grouped implementation
        id: implement
        continue-on-error: true
        run: |
          python - <<'PY'
          from pathlib import Path
          import os, traceback
          try:
              workflow = Path('.github/workflows/finalize-admin-plan-features.yml').read_text()
              marker = "          python - <<'PY'\n"
              end_marker = "\n          PY\n"
              raw = workflow.split(marker, 1)[1].split(end_marker, 1)[0]
              script = "\n".join(line[10:] if line.startswith("          ") else line for line in raw.splitlines())
              old = '''    if old not in text:\n        raise SystemExit(f"Missing expected block: {label}")\n    return text.replace(old, new, 1)'''
              new = '''    if old not in text:\n        if label == "remove cover builder from home cms":\n            begin = text.index('        <CmsSection title="Client gallery cover templates" defaultOpen>')\n            finish = text.index('        </CmsSection>', begin) + len('        </CmsSection>')\n            if finish < len(text) and text[finish:finish + 2] == "\\n\\n":\n                finish += 2\n            return text[:begin] + text[finish:]\n        if label == "admin resource links":\n            nav_start = text.index('    <nav className="mt-10 grid gap-2">', text.index('function AdminNav'))\n            nav_end = text.index('    </nav>', nav_start)\n            links = '      <div className="my-2 border-t" />\\n      <Link href="/admin/cover-templates" className={navClass(false)}><FileImage className="size-4" />Cover Templates</Link>\\n      <Link href="/admin/default-products" className={navClass(false)}><ShoppingBag className="size-4" />Default Products</Link>\\n'\n            return text[:nav_end] + links + text[nav_end:]\n        if label == "dashboard feature boundary open":\n            target = '          {campaignBuilderOpen ? (\\n            <CampaignBuilder onClose={closeCampaignBuilder} />'\n            insertion = '          <PlanFeatureLock\\n            feature={section === "store-gallery" ? "store" : "marketingEmails"}\\n            label={section === "store-gallery" ? "Store" : "Marketing email"}\\n            className={section === "store-gallery" || page === "marketing" || campaignBuilderOpen ? "min-h-[520px]" : "contents"}\\n            bypass={section !== "store-gallery" && page !== "marketing" && !campaignBuilderOpen}\\n          >\\n' + target\n            position = text.index(target)\n            return text[:position] + insertion + text[position + len(target):]\n        if label == "dashboard feature boundary close":\n            anchor = '          )}\\n        </div>\\n      </section>'\n            position = text.index(anchor, text.index('<PlanFeatureLock'))\n            replacement = '          )}\\n          </PlanFeatureLock>\\n        </div>\\n      </section>'\n            return text[:position] + replacement + text[position + len(anchor):]\n        if label == "custom covers disabled":\n            heading = '            <p className="mt-10 text-sm font-bold">Cover</p>\\n'\n            text = text.replace(heading, heading + '            <PlanFeatureNotice feature="customCover" label="Custom cover templates" />\\n', 1)\n            button = '''                <button\n                  key={template.id}\n                  className="text-center"\n                  onClick={() => onChange({ cover: `custom:${template.id}`, customCoverTemplate: template } as Partial<typeof design>)}\n                  type="button"\n                >'''\n            locked_button = '''                <button\n                  key={template.id}\n                  className={cn("relative text-center", customCoverAccess.locked && "cursor-not-allowed opacity-45")}\n                  disabled={customCoverAccess.locked}\n                  onClick={() => onChange({ cover: `custom:${template.id}`, customCoverTemplate: template } as Partial<typeof design>)}\n                  type="button"\n                >'''\n            if button not in text:\n                raise SystemExit("Could not locate custom cover template button")\n            return text.replace(button, locked_button, 1)\n        raise SystemExit(f"Missing expected block: {label}")\n    return text.replace(old, new, 1)'''
              script = script.replace(old, new, 1)
              exec(compile(script, 'admin-plan-finalizer.py', 'exec'))
          except BaseException:
              diagnostic = traceback.format_exc() + f"\nRun: {os.environ.get('GITHUB_RUN_ID', 'unknown')}\n"
              Path('docs/admin-finalizer-error.txt').write_text(diagnostic)
              raise
          PY

      - name: Commit diagnostic on failure
        if: steps.implement.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/admin-finalizer-error.txt
          git commit -m "chore: capture admin finalizer error"
          git push origin HEAD:development
          exit 1

      - name: Remove temporary trigger files
        if: steps.implement.outcome == 'success'
        run: |
          rm -f .github/workflows/finalize-admin-plan-features.yml
          rm -f .github/workflows/run-admin-plan-finalizer-pr.yml
          rm -f .github/workflows/run-admin-plan-finalizer.yml
          rm -f .github/ADMIN_PLAN_FEATURE_TRIGGER.md
          rm -f docs/admin-plan-feature-work-note.md
          rm -f docs/.keep-admin-feature-run
          rm -f docs/.admin-feature-status
          rm -f docs/.admin-feature-pr-ready
          rm -f docs/.admin-feature-final-trigger
          rm -f docs/.admin-feature-open-pr
          rm -f docs/.admin-feature-trigger-complete
          rm -f docs/.admin-feature-workflow-triggered
          rm -f docs/admin-finalizer-error.txt

      - uses: actions/setup-node@v4
        if: steps.implement.outcome == 'success'
        with:
          node-version: 22

      - name: Build backend
        if: steps.implement.outcome == 'success'
        working-directory: backend
        run: npm ci && npm run build

      - name: Build frontend
        if: steps.implement.outcome == 'success'
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: npm ci && npm run build

      - name: Commit grouped implementation
        if: steps.implement.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add admin template management and plan feature access"
          git push origin HEAD:development
