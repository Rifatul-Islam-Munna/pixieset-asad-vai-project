name: Mobile Gallery Final Verification

on:
  push:
    branches:
      - development
    paths:
      - .github/workflows/mobile-gallery-final-verification.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout development
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify backend, frontend, and Mobile Gallery types
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: |
          set +e
          (cd backend && npm ci && npm run build) > /tmp/mobile-backend.log 2>&1
          BACKEND_STATUS=$?
          (cd frontend && npm ci && npm run build) > /tmp/mobile-frontend.log 2>&1
          FRONTEND_STATUS=$?
          (cd frontend && npx tsc --noEmit --pretty false) > /tmp/mobile-types.log 2>&1
          TYPE_STATUS=$?
          MOBILE_ERRORS=$(grep -E "mobile-gallery|use-mobile-gallery" /tmp/mobile-types.log || true)

          mkdir -p docs
          {
            echo "# Mobile Gallery Final Verification"
            echo
            echo "Verified from the development branch after the final feature audit."
            echo
            if [ "$BACKEND_STATUS" -eq 0 ]; then echo "- Backend production build: PASS"; else echo "- Backend production build: FAIL"; fi
            if [ "$FRONTEND_STATUS" -eq 0 ]; then echo "- Frontend production build: PASS"; else echo "- Frontend production build: FAIL"; fi
            if [ -z "$MOBILE_ERRORS" ]; then echo "- Mobile Gallery TypeScript errors: NONE FOUND"; else echo "- Mobile Gallery TypeScript errors: FOUND"; fi
            if [ "$TYPE_STATUS" -eq 0 ]; then echo "- Full frontend TypeScript check: PASS"; else echo "- Full frontend TypeScript check: FAIL because the repository contains existing errors outside Mobile Gallery"; fi
            echo
            echo "## Mobile Gallery matching type errors"
            echo '```text'
            if [ -z "$MOBILE_ERRORS" ]; then echo "No Mobile Gallery type errors found."; else echo "$MOBILE_ERRORS"; fi
            echo '```'
            echo
            echo "## Backend build tail"
            echo '```text'
            tail -n 80 /tmp/mobile-backend.log
            echo '```'
            echo
            echo "## Frontend build tail"
            echo '```text'
            tail -n 120 /tmp/mobile-frontend.log
            echo '```'
          } > docs/mobile-gallery-final-verification.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/mobile-gallery-final-verification.md
          git commit -m "chore: record final mobile gallery verification" || true
          git push origin HEAD:development

          if [ "$BACKEND_STATUS" -ne 0 ] || [ "$FRONTEND_STATUS" -ne 0 ] || [ -n "$MOBILE_ERRORS" ]; then
            exit 1
          fi
