name: Finalize Homepage Collection Status

on:
  pull_request:
    branches: [main]
    types: [opened, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'development'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Remove legacy starred status checks
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('frontend/components/dashboard/client-dashboard.tsx')
          text = path.read_text()
          text = text.replace('collection.status === "starred" || ', '')
          if 'status === "starred"' in text or "status === 'starred'" in text:
              raise RuntimeError('A legacy starred collection status check remains')
          path.write_text(text)
          PY
          rm -f .github/workflows/finalize-homepage-status.yml

      - name: Commit publication-state cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: reserve collection status for draft and published"
          git pull --rebase origin development
          git push origin HEAD:development

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build backend
        working-directory: backend
        run: npm ci && npm run build

      - name: Build frontend
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: npm ci && npm run build
