name: Finalize Dynamic User Homepage

on:
  pull_request:
    branches: [main]
    types: [opened, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'development'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Normalize migration script
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/finalize_dynamic_homepage.py')
          text = path.read_text()
          text = text.replace(
              '    const isStarred = collection.status === "starred" || collection.settings?.starred === true;\n    const nextStatus = isStarred ? (collection.status === "starred" ? "draft" : collection.status) : "starred";',
              '    const isStarred = collection.settings?.starred === true;\n    const nextStatus = isStarred ? (collection.status === "starred" ? "draft" : collection.status) : "starred";',
              1,
          )
          path.write_text(text)
          PY

      - name: Apply homepage and publication integration
        id: migrate
        continue-on-error: true
        run: python scripts/finalize_dynamic_homepage.py > docs/homepage-migration-error.txt 2>&1

      - name: Commit migration diagnostic
        if: steps.migrate.outcome == 'failure'
        run: |
          cp docs/homepage-migration-error.txt /tmp/homepage-migration-error.txt
          git reset --hard HEAD
          cp /tmp/homepage-migration-error.txt docs/homepage-migration-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/homepage-migration-error.txt
          git commit -m "chore: capture homepage migration error"
          git pull --rebase origin development
          git push origin HEAD:development
          exit 1

      - name: Remove temporary migration files
        if: steps.migrate.outcome == 'success'
        run: |
          rm -f scripts/finalize_dynamic_homepage.py
          rm -f .github/workflows/finalize-dynamic-homepage.yml
          rm -f docs/homepage-migration-error.txt

      - name: Commit grouped implementation
        if: steps.migrate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: add dynamic published-collection homepages"
          git pull --rebase origin development
          git push origin HEAD:development

      - uses: actions/setup-node@v4
        if: steps.migrate.outcome == 'success'
        with:
          node-version: 22

      - name: Build backend
        if: steps.migrate.outcome == 'success'
        working-directory: backend
        run: npm ci && npm run build

      - name: Build frontend
        if: steps.migrate.outcome == 'success'
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: npm ci && npm run build
