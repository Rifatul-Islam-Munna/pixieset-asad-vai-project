name: Development Build Check

on:
  push:
    branches:
      - development
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout development
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: npm ci
      - name: Build backend
        run: npm run build

  frontend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      BASE_URL: http://127.0.0.1:4000
      NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout development
        uses: actions/checkout@v4
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
