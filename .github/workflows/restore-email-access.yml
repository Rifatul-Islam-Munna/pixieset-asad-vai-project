name: Restore email access

on:
  pull_request:
    branches:
      - developmentbranch
    paths:
      - .github/restore-email-access-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: developmentbranch
          fetch-depth: 0

      - name: Apply requested changes
        run: python .github/restore-email-access.py

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Remove temporary repair files
        run: |
          rm -f .github/restore-email-access.py
          rm -f .github/restore-email-access-trigger.txt
          rm -f .github/workflows/restore-email-access.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore Email Access and remove Quick Share Links"
          git push origin HEAD:developmentbranch
