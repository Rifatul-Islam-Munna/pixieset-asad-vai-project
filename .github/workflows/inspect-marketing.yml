name: Inspect marketing implementation

on:
  pull_request:
    branches:
      - developmentbranch
    paths:
      - .github/inspect-marketing-trigger.txt

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: developmentbranch
      - name: Inspect marketing implementation
        run: python .github/inspect-marketing.py
