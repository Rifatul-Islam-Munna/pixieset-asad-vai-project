name: Finalize Store Gallery Favorites

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'development'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Apply dashboard and gallery UX updates
        run: python scripts/finalize_store_gallery_favorites.py

      - name: Commit UI changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/components/mobile-gallery/mobile-gallery-admin.tsx frontend/components/dashboard/client-dashboard.tsx frontend/components/dashboard/public-gallery.tsx
          git commit -m "feat: finalize store dashboard and email-based gallery favorites"
          git push origin HEAD:development

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build backend
        working-directory: backend
        run: npm ci && npm run build

      - name: Build frontend
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
          MINIO_URL: http://127.0.0.1:9000
        run: npm ci && npm run build
