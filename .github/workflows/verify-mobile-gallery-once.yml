name: Verify Mobile Gallery Once

on:
  push:
    branches:
      - development
    paths:
      - .github/workflows/verify-mobile-gallery-once.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout development
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build backend and frontend and write report
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: |
          set +e
          (cd backend && npm ci && npm run build) > /tmp/backend-build.log 2>&1
          BACKEND_STATUS=$?
          (cd frontend && npm ci && npm run build) > /tmp/frontend-build.log 2>&1
          FRONTEND_STATUS=$?

          mkdir -p docs
          {
            echo "# Mobile Gallery Build Verification"
            echo
            echo "Generated from the development branch by GitHub Actions."
            echo
            if [ "$BACKEND_STATUS" -eq 0 ]; then
              echo "- Backend build: PASS"
            else
              echo "- Backend build: FAIL"
            fi
            if [ "$FRONTEND_STATUS" -eq 0 ]; then
              echo "- Frontend build: PASS"
            else
              echo "- Frontend build: FAIL"
            fi
            echo
            echo "## Backend log tail"
            echo '```text'
            tail -n 120 /tmp/backend-build.log
            echo '```'
            echo
            echo "## Frontend log tail"
            echo '```text'
            tail -n 160 /tmp/frontend-build.log
            echo '```'
          } > docs/mobile-gallery-build-report.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/mobile-gallery-build-report.md
          git commit -m "chore: record mobile gallery build verification" || true
          git push origin HEAD:development

          if [ "$BACKEND_STATUS" -ne 0 ] || [ "$FRONTEND_STATUS" -ne 0 ]; then
            exit 1
          fi
