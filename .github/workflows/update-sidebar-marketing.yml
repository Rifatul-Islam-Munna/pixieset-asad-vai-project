name: Update compact sidebar and marketing UI

on:
  pull_request:
    branches:
      - developmentbranch
    paths:
      - .github/update-sidebar-marketing-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: developmentbranch
          fetch-depth: 0
          show-progress: false

      - name: Make switcher patch precise
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/update-sidebar-marketing.py')
          text = path.read_text()
          old = '''text = replace_once(
              text,
              '<button className="flex items-center gap-2 text-sm font-bold outline-none">',
              '<button className={cn("flex h-11 items-center rounded-md text-sm font-bold outline-none hover:bg-[#f5f7f7]", collapsed ? "w-11 justify-center" : "gap-3 px-2")} title={collapsed ? active.title : undefined}>',
              "switcher button",
          )'''
          new = '''switcher_old = '<button className="flex items-center gap-2 text-sm font-bold outline-none">'
          switcher_new = '<button className={cn("flex h-11 items-center rounded-md text-sm font-bold outline-none hover:bg-[#f5f7f7]", collapsed ? "w-11 justify-center" : "gap-3 px-2")} title={collapsed ? active.title : undefined}>'
          if switcher_old not in text:
              raise RuntimeError("switcher button: target not found")
          text = text.replace(switcher_old, switcher_new, 1)'''
          if old not in text:
              raise SystemExit('Could not locate switcher patch block')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Apply dashboard UI patch
        id: apply
        continue-on-error: true
        run: python .github/update-sidebar-marketing.py > .github/update-sidebar-marketing.log 2>&1

      - name: Save patch error log
        if: steps.apply.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/update-sidebar-marketing.log
          git commit -m "Capture sidebar marketing patch error"
          git push origin HEAD:developmentbranch

      - name: Stop after patch error
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Remove temporary files
        run: |
          rm -f .github/update-sidebar-marketing.py
          rm -f .github/update-sidebar-marketing.log
          rm -f .github/workflows/update-sidebar-marketing.yml
          rm -f .github/update-sidebar-marketing-trigger.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish collapsible sidebar and marketing subscription settings"
          git push origin HEAD:developmentbranch
