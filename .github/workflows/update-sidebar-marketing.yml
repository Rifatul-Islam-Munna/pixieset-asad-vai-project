name: Update compact sidebar and marketing UI

on:
  pull_request:
    branches:
      - developmentbranch
    paths:
      - .github/update-sidebar-marketing-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: developmentbranch
          fetch-depth: 0
          show-progress: false

      - name: Make offset patch tolerant
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/update-sidebar-marketing-v2.py')
          text = path.read_text()
          old = '''text = first(
              text,
              ''' + "'''" + '''              ? collapsed
                ? "md:pl-[76px]"
                : "md:pl-[292px]"''' + "'''" + ''',
              ''' + "'''" + '''              ? collapsed
                ? "md:pl-[72px]"
                : "md:pl-[248px]"''' + "'''" + ''',
              "dashboard content offset",
          )'''
          new = '''if 'md:pl-[76px]' not in text or 'md:pl-[292px]' not in text:
              raise RuntimeError("dashboard content offset: target not found")
          text = text.replace('md:pl-[76px]', 'md:pl-[72px]', 1)
          text = text.replace('md:pl-[292px]', 'md:pl-[248px]', 1)'''
          if old not in text:
              raise SystemExit('Could not locate offset patch block')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Apply dashboard UI patch
        id: apply
        continue-on-error: true
        run: python .github/update-sidebar-marketing-v2.py > .github/update-sidebar-marketing.log 2>&1

      - name: Save patch error log
        if: steps.apply.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/update-sidebar-marketing.log
          git commit -m "Capture sidebar marketing patch error"
          git push origin HEAD:developmentbranch

      - name: Stop after patch error
        if: steps.apply.outcome == 'failure'
        run: exit 1

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Remove temporary files
        run: |
          rm -f .github/update-sidebar-marketing.py
          rm -f .github/update-sidebar-marketing-v2.py
          rm -f .github/update-sidebar-marketing.log
          rm -f .github/workflows/update-sidebar-marketing.yml
          rm -f .github/update-sidebar-marketing-trigger.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish collapsible sidebar and marketing subscription settings"
          git push origin HEAD:developmentbranch
