name: Update compact sidebar and marketing UI

on:
  pull_request:
    branches:
      - developmentbranch
    paths:
      - .github/update-sidebar-marketing-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: developmentbranch
          fetch-depth: 0
          show-progress: false

      - name: Apply dashboard UI patch
        run: python .github/update-sidebar-marketing.py

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Remove temporary files
        run: |
          rm -f .github/update-sidebar-marketing.py
          rm -f .github/workflows/update-sidebar-marketing.yml
          rm -f .github/update-sidebar-marketing-trigger.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Polish collapsible sidebar and marketing subscription settings"
          git push origin HEAD:developmentbranch
