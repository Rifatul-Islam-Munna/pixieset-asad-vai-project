name: Wire Audited Mobile Gallery Components

on:
  push:
    branches:
      - development
    paths:
      - .github/workflows/mobile-gallery-wire-components.yml

permissions:
  contents: write

jobs:
  wire-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout development
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      - name: Wire new audited components
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('frontend/components/mobile-gallery/mobile-gallery-admin.tsx')
          text = path.read_text()

          replacements = [
            (
              'import { MobileGalleryPublic } from "./mobile-gallery-public";',
              'import { MobileGalleryPublic } from "./mobile-gallery-public";\nimport { MobileGalleryDesignEditor } from "./mobile-gallery-design-editor";\nimport { MobileGalleryShareScreen } from "./mobile-gallery-share-screen";',
              'component imports',
            ),
            (
              '  const { appQuery, updateApp, uploadImages, reorderImages, deleteImage } = useMobileGalleryApp(appId);',
              '  const { appQuery, updateApp, uploadImages, reorderImages, deleteImage, sendInvite } = useMobileGalleryApp(appId);',
              'send invite hook',
            ),
            (
              '  if (view === "share") return <ShareScreen app={app} />;',
              '  if (view === "share") return <MobileGalleryShareScreen app={app} profile={profile} sendInvite={sendInvite} />;',
              'share screen',
            ),
            (
              '        {tab === "design" && <DesignEditor app={app} profile={profile} updateApp={updateApp} />}',
              '        {tab === "design" && <MobileGalleryDesignEditor app={app} profile={profile} updateApp={updateApp} />}',
              'design editor',
            ),
          ]

          for old, new, label in replacements:
            if old not in text:
              raise SystemExit(f'Missing expected block: {label}')
            text = text.replace(old, new, 1)

          path.write_text(text)
          PY

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build backend
        working-directory: backend
        run: npm ci && npm run build

      - name: Build frontend
        working-directory: frontend
        env:
          BASE_URL: http://127.0.0.1:4000
          NEXT_PUBLIC_BASE_URL: http://127.0.0.1:4000
        run: npm ci && npm run build

      - name: Commit wired components
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/components/mobile-gallery/mobile-gallery-admin.tsx
          git commit -m "fix(mobile-gallery): wire completed design and share flows"
          git push origin HEAD:development
